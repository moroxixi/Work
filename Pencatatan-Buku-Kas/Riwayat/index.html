<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Riwayat Kas Harian</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <nav class="quicknav" aria-label="Navigasi cepat">
    <a class="quicknav-item quicknav-scan" href="https://moroxixi.github.io/Work/Pencatatan-Buku-Kas/Scan-Struk/index.html">
      <span class="quicknav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V5a1 1 0 0 1 1-1h2"/><path d="M20 7V5a1 1 0 0 0-1-1h-2"/><path d="M4 17v2a1 1 0 0 0 1 1h2"/><path d="M20 17v2a1 1 0 0 1-1 1h-2"/><rect x="7" y="8" width="10" height="8" rx="1"/></svg>
      </span>
      <span class="quicknav-label">Scan Struk</span>
    </a>
    <a class="quicknav-item quicknav-riwayat" href="https://moroxixi.github.io/Work/Pencatatan-Buku-Kas/Riwayat/index.html">
      <span class="quicknav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="7.5"/><path d="M12 9.5V13l2.5 1.5"/><path d="M9 3h6"/></svg>
      </span>
      <span class="quicknav-label">Riwayat</span>
    </a>
    <a class="quicknav-item quicknav-stok" href="https://moroxixi.github.io/Work/Pencatatan-Buku-Kas/Stok/index.html">
      <span class="quicknav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 8 12 4l8.5 4-8.5 4-8.5-4Z"/><path d="M3.5 8v8L12 20l8.5-4V8"/><path d="M12 12v8"/></svg>
      </span>
      <span class="quicknav-label">Stok</span>
    </a>
  </nav>

  <header class="topbar">
    <h1>Riwayat Kas Harian</h1>
    <p class="subtitle" id="tanggalLabel">Memuat tanggal...</p>
  </header>

  <div class="nav-bar">
    <button type="button" id="btnKemarin" class="nav-btn">&larr; Kemarin</button>
    <button type="button" id="btnHariIni" class="nav-btn nav-btn-primary">Hari Ini</button>
    <label class="nav-btn nav-btn-date" for="datePicker">
      <span>Pilih Tanggal</span>
      <input type="date" id="datePicker">
    </label>
  </div>

  <div class="toolbar">
    <button type="button" id="btnRefresh" class="refresh-btn">
      <span id="refreshIcon" class="refresh-icon">&#8635;</span> Refresh
    </button>
    <span id="liveStatus" class="live-status"></span>
  </div>

  <div id="summaryBar" class="summary-bar" hidden>
    <div class="summary-item summary-masuk">
      <span class="summary-label">Masuk</span>
      <span class="summary-value" id="summaryMasuk">Rp 0</span>
    </div>
    <div class="summary-item summary-keluar">
      <span class="summary-label">Keluar</span>
      <span class="summary-value" id="summaryKeluar">Rp 0</span>
    </div>
  </div>

  <div id="listWrap" class="list-wrap">
    <p class="loading-msg" id="loadingMsg">Memuat data...</p>
    <p class="empty-msg" id="emptyMsg" hidden>Belum ada transaksi di tanggal ini.</p>
    <p class="error-msg" id="errorMsg" hidden></p>
    <div id="cardList"></div>
  </div>
</div>

<!-- Modal Edit -->
<div id="editModal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h3>Edit Transaksi</h3>
    <p id="editWarning" class="edit-warning" hidden></p>

    <div class="field">
      <label for="editKategori">Kategori</label>
      <select id="editKategori" class="text-input"></select>
    </div>
    <div class="field">
      <label for="editBelanjaDi">Belanja Di / Detail</label>
      <input type="text" id="editBelanjaDi" class="text-input" placeholder="Kosongkan kalau tidak relevan">
    </div>
    <div class="field">
      <label for="editKeterangan">Keterangan</label>
      <input type="text" id="editKeterangan" class="text-input">
    </div>
    <div class="field">
      <label for="editJumlah">Jumlah (Rp)</label>
      <input type="text" inputmode="numeric" id="editJumlah" class="text-input jumlah-input">
    </div>

    <p id="editStatus" class="status" role="status" aria-live="polite"></p>

    <div class="modal-actions">
      <button type="button" id="btnBatalEdit" class="btn-secondary">Batal</button>
      <button type="button" id="btnSimpanEdit" class="btn-primary">Simpan</button>
    </div>
  </div>
</div>

<!-- Modal Konfirmasi Hapus -->
<div id="deleteModal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h3>Hapus Transaksi?</h3>
    <p id="deleteWarning" class="edit-warning" hidden></p>
    <p id="deleteDetail" class="delete-detail"></p>
    <p id="deleteStatus" class="status" role="status" aria-live="polite"></p>
    <div class="modal-actions">
      <button type="button" id="btnBatalHapus" class="btn-secondary">Batal</button>
      <button type="button" id="btnKonfirmHapus" class="btn-danger">Ya, Hapus</button>
    </div>
  </div>
</div>
<script src="https://moroxixi.github.io/Work/Pencatatan-Buku-Kas/config.js"></script>
<script src="script.js"></script>
</body>
</html>
