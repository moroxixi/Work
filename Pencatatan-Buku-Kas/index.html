<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Kas Harian</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <header class="topbar">
    <h1>Input Kas Harian</h1>
    <p class="subtitle">Wonton &amp; Mie Jebew · Wonton · Tempura</p>
  </header>

  <form id="cashForm" class="card" autocomplete="off">

    <div class="field">
      <label for="keterangan">Keterangan</label>
      <input type="text" id="keterangan" name="keterangan" placeholder="Contoh: Setoran hari ini / Belanja bahan" required>
    </div>

    <div class="field">
      <label for="kategori">Kategori</label>
      <select id="kategori" name="kategori" required>
        <option value="" disabled selected>Pilih kategori…</option>
        <optgroup label="Uang Masuk">
          <option value="Penjualan">Penjualan</option>
          <option value="Setoran Cabang Tempura">Setoran Cabang Tempura</option>
          <option value="Setoran Cabang Babakan">Setoran Cabang Babakan</option>
          <option value="Setoran Cabang Leweung Gajah">Setoran Cabang Leweung Gajah</option>
          <option value="Setoran Cabang Depan RS">Setoran Cabang Depan RS</option>
        </optgroup>
        <optgroup label="Uang Keluar">
          <option value="Belanja">Belanja</option>
          <option value="Gaji/Upah">Gaji/Upah</option>
          <option value="Sewa Tempat">Sewa Tempat</option>
          <option value="Tunjangan">Tunjangan</option>
          <option value="Bonus">Bonus</option>
        </optgroup>
      </select>
    </div>

    <div class="field" id="belanjaDiWrap" hidden>
      <label for="belanjaDi">Belanja di</label>
      <select id="belanjaDi" name="belanjaDi">
        <option value="" disabled selected>Pilih toko…</option>
        <option value="Ayam Ma'mun">Ayam Ma'mun</option>
        <option value="Ayam Depan Pasar">Ayam Depan Pasar</option>
        <option value="Ayam Bi Warsih">Ayam Bi Warsih</option>
        <option value="Kulit Pangsit">Kulit Pangsit</option>
        <option value="Plastik Pasar">Plastik Pasar</option>
        <option value="Plastik DA">Plastik DA</option>
        <option value="Sayur">Sayur</option>
        <option value="Mini Frozen">Mini Frozen</option>
        <option value="Ngena-Q Frozen">Ngena-Q Frozen</option>
        <option value="Mega Frozen">Mega Frozen</option>
        <option value="__lainnya__">Toko lain (ketik manual)</option>
      </select>
      <input type="text" id="belanjaDiLainnya" name="belanjaDiLainnya" placeholder="Nama toko baru" hidden>
    </div>

    <div class="field">
      <label for="jumlah">Jumlah (Rp)</label>
      <input type="text" inputmode="numeric" id="jumlah" name="jumlah" placeholder="0" required>
    </div>

    <button type="submit" id="submitBtn" class="submit-btn">
      <span class="btn-label">Simpan</span>
    </button>

    <p id="statusMsg" class="status" role="status" aria-live="polite"></p>
  </form>

  <p class="footnote">Waktu (timestamp) tercatat otomatis saat kamu tekan Simpan.</p>
</div>

<script src="script.js"></script>
</body>
</html>
