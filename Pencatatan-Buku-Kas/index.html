<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Input Kas Harian</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
	
  <a class="back-link" href="https://moroxixi.github.io/Work/Pencatatan-Buku-Kas/Scan-Struk/index.html">&larr; Scan Struk disini!</a>
  <header class="topbar">
    <h1>Kas Harian</h1>
    <p class="subtitle">Wonton &amp; Mie Jebew · Wonton · Tempura</p>
  </header>

  <form id="cashForm" autocomplete="off">

    <!-- ===== CARD: UANG MASUK ===== -->
    <section class="card card-masuk">
      <div class="card-head">
        <span class="dot dot-masuk"></span>
        <h2>Uang Masuk</h2>
      </div>
      <div class="chip-grid" data-group="kategoriUtama-masuk">
        <label class="chip chip-masuk">
          <input type="radio" name="kategoriUtama" value="MAO Frozen" data-arah="masuk">
          <span>MAO Frozen</span>
        </label>
        <label class="chip chip-masuk">
          <input type="radio" name="kategoriUtama" value="MAO Instan" data-arah="masuk">
          <span>MAO Instan</span>
        </label>
        <label class="chip chip-masuk">
          <input type="radio" name="kategoriUtama" value="Outlet" data-arah="masuk" id="katOutlet">
          <span>Outlet</span>
        </label>
        <label class="chip chip-masuk">
          <input type="radio" name="kategoriUtama" value="Lainnya" data-arah="masuk" id="katLainnyaMasuk">
          <span>Lainnya</span>
        </label>
      </div>

      <!-- Muncul hanya kalau kategori = Outlet -->
      <div class="subsection" id="outletWrap" hidden>
        <p class="subsection-label">Outlet mana?</p>
        <div class="chip-grid chip-grid-outlet" data-group="outletDari">
          <label class="chip chip-outlet"><input type="radio" name="outletDari" value="Babakan"><span>Babakan</span></label>
          <label class="chip chip-outlet"><input type="radio" name="outletDari" value="Depan RS"><span>Depan RS</span></label>
          <label class="chip chip-outlet"><input type="radio" name="outletDari" value="Leweung Gajah"><span>Leweung Gajah</span></label>
          <label class="chip chip-outlet"><input type="radio" name="outletDari" value="Tempura"><span>Tempura</span></label>
        </div>
      </div>
    </section>

    <!-- ===== CARD: UANG KELUAR ===== -->
    <section class="card card-keluar">
      <div class="card-head">
        <span class="dot dot-keluar"></span>
        <h2>Uang Keluar</h2>
      </div>

      <!-- Tab: Belanja (fokus utama, default aktif) vs Lainnya -->
      <div class="seg-tabs" data-group="kategoriUtama-keluar">
        <label class="seg-tab">
          <input type="radio" name="kategoriUtama" value="Belanja" data-arah="keluar" id="tabBelanja" checked>
          <span>Belanja</span>
        </label>
        <label class="seg-tab">
          <input type="radio" name="kategoriUtama" value="__lainnyaKeluar__" data-arah="keluar" id="tabLainnyaKeluar">
          <span>Lainnya</span>
        </label>
      </div>

      <!-- Belanja: daftar toko, tampil langsung (default) -->
      <div class="subsection subsection-primary" id="belanjaDiWrap">
        <p class="subsection-label">Belanja di</p>
        <div class="chip-grid chip-grid-toko" data-group="belanjaDi">
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Ayam Bi Warsih"><span>Ayam Bi Warsih</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Ayam Depan Pasar"><span>Ayam Depan Pasar</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Ayam Ma'mun"><span>Ayam Ma'mun</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Baso Adib"><span>Baso Adib</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Gas Abah"><span>Gas Abah</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Kulit Pangsit"><span>Kulit Pangsit</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Mega Frozen"><span>Mega Frozen</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Mini Frozen"><span>Mini Frozen</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Ngena-Q Frozen"><span>Ngena-Q Frozen</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Plastik DA"><span>Plastik DA</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Plastik Pasar"><span>Plastik Pasar</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Sayur"><span>Sayur</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Surya"><span>Surya</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Telor"><span>Telor</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Bawang"><span>Bawang</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="Ceksun"><span>Ceksun</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="3Saudara"><span>3 Saudara</span></label>
          <label class="chip chip-toko"><input type="radio" name="belanjaDi" value="__lainnya__" id="tokoLainnya"><span>Lainnya…</span></label>
        </div>
        <input type="text" id="belanjaDiLainnyaInput" class="text-input" placeholder="Nama toko" hidden>
      </div>

      <!-- Lainnya: kategori keluar non-belanja -->
      <div class="subsection subsection-primary" id="kategoriLainWrap" hidden>
        <p class="subsection-label">Jenis pengeluaran</p>
        <div class="chip-grid" data-group="kategoriLain">
          <label class="chip chip-keluar"><input type="radio" name="kategoriLain" value="Bonus"><span>Bonus</span></label>
          <label class="chip chip-keluar"><input type="radio" name="kategoriLain" value="Dividen"><span>Dividen</span></label>
          <label class="chip chip-keluar"><input type="radio" name="kategoriLain" value="Gaji/Upah"><span>Gaji/Upah</span></label>
          <label class="chip chip-keluar"><input type="radio" name="kategoriLain" value="Parkir"><span>Parkir</span></label>
          <label class="chip chip-keluar"><input type="radio" name="kategoriLain" value="Sewa Tempat"><span>Sewa Tempat</span></label>
          <label class="chip chip-keluar"><input type="radio" name="kategoriLain" value="Tunjangan"><span>Tunjangan</span></label>
          <label class="chip chip-keluar"><input type="radio" name="kategoriLain" value="__lainnya__" id="kategoriLainnyaRadio"><span>Lainnya…</span></label>
        </div>
        <input type="text" id="kategoriLainnyaInput" class="text-input" placeholder="Nama pengeluaran baru" hidden>
      </div>
    </section>

    <!-- ===== DETAIL TRANSAKSI ===== -->
    <section class="card card-detail">
      <div class="field">
        <label for="keterangan">Keterangan <span class="optional-tag">(opsional)</span></label>
        <input type="text" id="keterangan" class="text-input" placeholder="Contoh: Setoran hari ini">
      </div>
      <div class="field">
        <label for="jumlah">Jumlah (Rp)</label>
        <input type="text" inputmode="numeric" id="jumlah" class="text-input jumlah-input" placeholder="0" required>
      </div>
    </section>

    <button type="submit" id="submitBtn" class="submit-btn">
      <span class="btn-label">Simpan</span>
    </button>

    <p id="statusMsg" class="status" role="status" aria-live="polite"></p>
  </form>

  <p class="footnote">Waktu tercatat otomatis saat kamu tekan Simpan.</p>
</div>

<script src="script.js"></script>
</body>
</html>
